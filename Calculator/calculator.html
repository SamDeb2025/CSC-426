<!DOCTYPE html>
<html>
<head>
  <title>Calculator</title>
  <style>
    body { text-align: center; font-family: Arial; }
    input { width: 200px; height: 40px; font-size: 20px; }
    button { width: 45px; height: 45px; margin: 5px; font-size: 18px; }
  </style>
</head>
<body>

<h2>Simple Calculator</h2>
<input type="text" id="screen"><br><br>

<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button onclick="press('/')">/</button><br>

<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button onclick="press('*')">*</button><br>

<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button onclick="press('-')">-</button><br>

<button onclick="press('0')">0</button>
<button onclick="press('%')">%</button>
<button onclick="press('^')">^</button>
<button onclick="calculate()">=</button>
<button onclick="press('+')">+</button><br>

<button onclick="clearScreen()">C</button>

<script>
function press(val) {
  document.getElementById("screen").value += val;
}

function calculate() {
  try {
    let expression = document.getElementById("screen").value;
    expression = expression.replace("^", "**"); // power fix
    document.getElementById("screen").value = eval(expression);
  } catch {
    alert("Error");
  }
}

function clearScreen() {
  document.getElementById("screen").value = "";
}
</script>

</body>
</html>
